<div class="container">

  <img src="/logo.png" alt="GameLog Logo" class="logo">

  <app-jogo-form
    (adicionar)="adicionarJogo($event)">
  </app-jogo-form>

  <app-jogo-lista
    [jogos]="jogos()"
    (remover)="removerJogo($event)"
    (alterarStatus)="atualizarJogo($event)">
  </app-jogo-lista>

</div>
